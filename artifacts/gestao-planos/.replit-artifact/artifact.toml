kind = "web"
previewPath = "/"
title = "Gestão de Planos de Saúde"
version = "1.0.0"
id = "artifacts/gestao-planos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22072

[services.development]
run = "pnpm --filter @workspace/gestao-planos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gestao-planos", "run", "build" ]
publicDir = "artifacts/gestao-planos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22072"
BASE_PATH = "/"
